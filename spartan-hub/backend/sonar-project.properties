# SonarQube project configuration for Spartan Hub backend
sonar.projectKey=spartan-hub-backend
sonar.organization=spartan-hub
sonar.projectName=Spartan Hub Backend
sonar.projectVersion=1.0

# Source directories
sonar.sources=src
sonar.tests=tests,__tests__,test

# Exclusions
sonar.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/docs/**,**/scripts/**

# Test coverage
sonar.testExecutionReportPaths=coverage/test-report.xml
sonar.coverageReportPaths=coverage/lcov.info

# Language-specific settings
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Inclusions for security and quality analysis
sonar.inclusions=**/*.ts,**/*.js,**/*.json,**/*.yml,**/*.yaml