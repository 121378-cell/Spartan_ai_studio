# Alertmanager Configuration for Spartan Hub

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@spartanhub.com'
  smtp_auth_username: 'alerts@spartanhub.com'
  smtp_auth_password: 'your-app-password'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'slack-notifications'
  
  routes:
    - match:
        team: 'engagement'
      receiver: 'engagement-team'
      continue: true
      
    - match:
        team: 'community'
      receiver: 'community-team'
      continue: true
      
    - match:
        team: 'retention'
      receiver: 'retention-team'
      continue: true
      
    - match:
        team: 'sre'
      receiver: 'sre-team'
      continue: true
      
    - match:
        severity: 'critical'
      receiver: 'pagerduty'
      
    - match:
        severity: 'warning'
      receiver: 'email-warning'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts'
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: 'engagement-team'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#engagement-team'
        send_resolved: true
        title: '[Engagement] {{ .CommonLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instances:* {{ .CommonLabels.instance }}

  - name: 'community-team'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#community-team'
        send_resolved: true
        title: '[Community] {{ .CommonLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instances:* {{ .CommonLabels.instance }}

  - name: 'retention-team'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#retention-team'
        send_resolved: true
        title: '[Retention] {{ .CommonLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instances:* {{ .CommonLabels.instance }}

  - name: 'sre-team'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#sre-team'
        send_resolved: true
        title: '[SRE] {{ .CommonLabels.alertname }}'
        text: |
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          *Instances:* {{ .CommonLabels.instance }}

  - name: 'pagerduty'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        send_resolved: true

  - name: 'email-warning'
    email_configs:
      - to: 'dev-team@spartanhub.com'
        send_resolved: true
        headers:
          Subject: 'Spartan Hub Warning: {{ .CommonLabels.alertname }}'

templates:
  - '/etc/alertmanager/template/*.tmpl'