# Prometheus Configuration for Spartan Hub - Enhanced Phase 9 Monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Alert rules for Phase 9 engagement system
rule_files:
  - "alert.rules"

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "spartan-hub-backend"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s
    
  - job_name: "spartan-hub-frontend"
    static_configs:
      - targets: ["localhost:3000"]
    metrics_path: "/metrics"
    scrape_interval: 30s
    
  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]
    scrape_interval: 15s
    
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["localhost:9121"]
    scrape_interval: 15s

  # Database monitoring
  - job_name: "sqlite-stats"
    static_configs:
      - targets: ["localhost:9091"]
    scrape_interval: 30s

  # Phase 9 Engagement System
  - job_name: "engagement-system"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/metrics/engagement"
    scrape_interval: 15s

  # WebSocket connections monitoring
  - job_name: "websocket-connections"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/metrics/websocket"
    scrape_interval: 10s

# Remote write configuration (if using remote storage)
remote_write:
  - url: "http://monitoring-stack:9090/api/v1/write"
    write_relabel_configs:
      - source_labels: [__name__]
        regex: "(engagement|churn|achievement|streak|community)_.*"
        action: keep