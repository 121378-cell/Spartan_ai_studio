server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: spartan-hub-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: spartan-hub-backend
          __path__: /var/log/spartan-hub/backend/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            context: context
            timestamp: timestamp
      - labels:
          level:
          context:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: spartan-hub-frontend
    static_configs:
      - targets:
          - localhost
        labels:
          job: spartan-hub-frontend
          __path__: /var/log/spartan-hub/frontend/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*.log