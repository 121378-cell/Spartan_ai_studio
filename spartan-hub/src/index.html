<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spartan Local Fitness Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- 
      Note: For production, Tailwind CSS should be installed as a PostCSS plugin or via CLI.
      Using cdn.tailwindcss.com is not recommended for production environments.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'spartan-gold': '#D4AF37',
              'spartan-bg': '#121212',
              'spartan-surface': '#1E1E1E',
              'spartan-card': '#2A2A2A',
              'spartan-border': '#444444',
              'spartan-text': '#E0E0E0',
              'spartan-text-secondary': '#A0A0A0',
            },
          }
        }
      }
    </script>
    <style>
      /* Custom animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.5s ease-out forwards;
      }
      
      @keyframes slideInFromRight {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      .animate-slideInFromRight {
        animation: slideInFromRight 0.5s ease-out forwards;
      }

      @keyframes celebrate {
        0% { transform: scale(0.5); opacity: 0; }
        60% { transform: scale(1.2) rotate(-5deg); opacity: 1; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
      }
      .animate-celebrate {
        animation: celebrate 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      @keyframes pulse-slow {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.05); opacity: 0.7; }
      }
      .animate-pulse-slow {
          animation: pulse-slow 5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      
      @keyframes high-exertion-pulse {
        0% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); }
        50% { box-shadow: inset 0 0 100px 50px rgba(239, 68, 68, 0.4); }
        100% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); }
      }
      .high-exertion-flash {
        animation: high-exertion-pulse 1s ease-out forwards;
      }
      
      .drag-over {
        background-color: rgba(212, 175, 55, 0.2); /* spartan-gold with opacity */
        border-color: rgba(212, 175, 55, 0.5);
      }
      
      /* Enhanced scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #D4AF37, #B8860B);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #D4AF37;
      }
    </style>
    <link rel="stylesheet" href="./index.css">
  </head>
  <body class="bg-spartan-bg text-spartan-text font-sans">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
