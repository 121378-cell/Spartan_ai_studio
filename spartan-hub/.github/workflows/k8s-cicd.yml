name: Kubernetes CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - infra-k8s-prod-manifests-helm-cicd
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: synergycoach/backend
  IMAGE_NAME_AI: synergycoach/ai-microservice
  HELM_CHART_PATH: ./spartan-hub/scripts/deployment/helm/spartan-hub
  K8S_NAMESPACE: spartan-hub

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: spartan-hub/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./spartan-hub

    - name: Run tests
      run: npm test
      working-directory: ./spartan-hub

    - name: Run linting
      run: npm run lint
      working-directory: ./spartan-hub

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-push:
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Extract metadata for AI microservice
      id: meta-ai
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_AI }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./spartan-hub/backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push AI microservice image
      uses: docker/build-push-action@v5
      with:
        context: ./spartan-hub/backend/ai-microservice
        push: true
        tags: ${{ steps.meta-ai.outputs.tags }}
        labels: ${{ steps.meta-ai.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.spartan-hub.com
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region us-east-1 --name spartan-hub-staging
    
    - name: Deploy to staging
      run: |
        helm upgrade --install spartan-hub-staging ${{ env.HELM_CHART_PATH }} \
          --namespace spartan-hub-staging \
          --create-namespace \
          --set image.tag=${{ github.sha }} \
          --set ingress.host=staging.spartan-hub.com \
          --set ingress.enabled=true \
          --set externalApiKeys.apiNinjasKey=${{ secrets.STAGING_API_NINJAS_KEY }} \
          --set externalApiKeys.edamamAppId=${{ secrets.STAGING_EDAMAM_APP_ID }} \
          --set externalApiKeys.edamamAppKey=${{ secrets.STAGING_EDAMAM_APP_KEY }} \
          --set externalApiKeys.fatsecretKey=${{ secrets.STAGING_FATSECRET_KEY }} \
          --set externalApiKeys.rapidapiKey=${{ secrets.STAGING_RAPIDAPI_KEY }} \
          --set externalApiKeys.exerciseDbKey=${{ secrets.STAGING_EXERCISE_DB_KEY }} \
          --wait --timeout 300s
    
    - name: Run smoke tests
      run: |
        kubectl run smoke-test --image=curlimages/curl:latest --rm -it \
          --restart=Never -- curl -f http://backend:3001/health

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://spartan-hub.com
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Configure kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Update kubeconfig
      run: aws eks update-kubeconfig --region us-east-1 --name spartan-hub-production
    
    - name: Deploy to production
      run: |
        helm upgrade --install spartan-hub-production ${{ env.HELM_CHART_PATH }} \
          --namespace spartan-hub-production \
          --create-namespace \
          --set image.tag=${{ github.sha }} \
          --set ingress.host=spartan-hub.com \
          --set ingress.enabled=true \
          --set replicaCount=5 \
          --set autoscaling.minReplicas=5 \
          --set autoscaling.maxReplicas=15 \
          --set externalApiKeys.apiNinjasKey=${{ secrets.PROD_API_NINJAS_KEY }} \
          --set externalApiKeys.edamamAppId=${{ secrets.PROD_EDAMAM_APP_ID }} \
          --set externalApiKeys.edamamAppKey=${{ secrets.PROD_EDAMAM_APP_KEY }} \
          --set externalApiKeys.fatsecretKey=${{ secrets.PROD_FATSECRET_KEY }} \
          --set externalApiKeys.rapidapiKey=${{ secrets.PROD_RAPIDAPI_KEY }} \
          --set externalApiKeys.exerciseDbKey=${{ secrets.PROD_EXERCISE_DB_KEY }} \
          --wait --timeout 600s
    
    - name: Run health check
      run: |
        kubectl run health-check --image=curlimages/curl:latest --rm -it \
          --restart=Never -- curl -f https://spartan-hub.com/api/health
    
    - name: Run database migration
      run: |
        kubectl exec deployment/spartan-hub-backend -- npm run migrate

  security-audit:
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Run kubeaudit
      uses: docker://shopify/kubeaudit:latest
      with:
        args: all --json --namespace spartan-hub-production
    
    - name: Run kubesec scan
      uses: docker://kubesec/kubesec:v2.11.2
      with:
        entrypoint: kubesec
        args: scan spartan-hub/scripts/deployment/helm/spartan-hub/templates/*.yaml

  rollback:
    runs-on: ubuntu-latest
    if: failure()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Rollback deployment
      run: |
        helm rollback spartan-hub-production --namespace spartan-hub-production --wait
