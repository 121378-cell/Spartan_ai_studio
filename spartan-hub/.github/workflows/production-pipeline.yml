name: Production Pipeline with Coverage Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  COVERAGE_THRESHOLD: 80

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spartan-hub/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./spartan-hub

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./spartan-hub/backend
      
      - name: Type check
        run: npm run type-check
        working-directory: ./spartan-hub
      
      - name: Lint
        run: npm run lint
        working-directory: ./spartan-hub
      
      - name: Security audit
        run: npm run security-audit
        working-directory: ./spartan-hub

  # Job 2: Unit Tests with Coverage
  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spartan-hub/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./spartan-hub
      
      - name: Run unit tests with coverage
        run: |
          npm run test:node -- --coverage \
            --coverageThreshold='{"global":{"branches":${{ env.COVERAGE_THRESHOLD }},"functions":${{ env.COVERAGE_THRESHOLD }},"lines":${{ env.COVERAGE_THRESHOLD }},"statements":${{ env.COVERAGE_THRESHOLD }}}}'
        working-directory: ./spartan-hub
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./spartan-hub/coverage/lcov.info
          fail_ci_if_error: true
          verbose: true

  # Job 3: Component Tests
  component-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: spartan-hub/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./spartan-hub
      
      - name: Run component tests
        run: npm run test:components
        working-directory: ./spartan-hub

  # Job 4: Integration Tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spartan_hub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            spartan-hub/package-lock.json
            spartan-hub/backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./spartan-hub
      
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/spartan_hub_test
          REDIS_URL: redis://localhost:6379
        run: npm test
        working-directory: ./spartan-hub/backend

  # Job 5: Security Scan
  security-scan:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 6: Build and Push
  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, component-tests, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./spartan-hub/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./spartan-hub
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest

  # Job 7: Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
      
      - name: Deploy to staging
        run: |
          kubectl set image deployment/backend backend=ghcr.io/${{ github.repository }}/backend:${{ github.sha }} -n spartan-hub-staging
          kubectl set image deployment/frontend frontend=ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} -n spartan-hub-staging
          kubectl rollout status deployment/backend -n spartan-hub-staging
          kubectl rollout status deployment/frontend -n spartan-hub-staging
      
      - name: Run smoke tests
        run: |
          curl -f http://staging.spartan-hub.com/health
          curl -f http://staging.spartan-hub.com/api/health

  # Job 8: Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
      
      - name: Deploy to production (blue-green)
        run: |
          # Blue-green deployment
          kubectl apply -f spartan-hub/k8s/ --namespace=spartan-hub
          kubectl set image deployment/backend backend=ghcr.io/${{ github.repository }}/backend:${{ github.sha }} -n spartan-hub
          kubectl set image deployment/frontend frontend=ghcr.io/${{ github.repository }}/frontend:${{ github.sha }} -n spartan-hub
          kubectl rollout status deployment/backend -n spartan-hub --timeout=300s
          kubectl rollout status deployment/frontend -n spartan-hub --timeout=300s
      
      - name: Verify deployment
        run: |
          kubectl get pods -n spartan-hub
          curl -f https://spartan-hub.com/health
          curl -f https://api.spartan-hub.com/health
