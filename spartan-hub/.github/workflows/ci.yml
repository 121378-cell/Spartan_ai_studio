name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Install deps
        working-directory: spartan-hub
        run: npm ci
      - name: Frontend tests
        working-directory: spartan-hub
        run: npm run test:components

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Install deps
        working-directory: spartan-hub/backend
        run: npm ci
      - name: Backend tests
        working-directory: spartan-hub/backend
        run: npm test

  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Install deps
        working-directory: spartan-hub
        run: npm ci
      - name: Lint & type-check
        working-directory: spartan-hub
        run: |
          npm run lint
          npm run type-check

  build-validation:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Install deps
        working-directory: spartan-hub
        run: npm ci
      - name: Build all
        working-directory: spartan-hub
        run: npm run build:all
      - name: Validate build outputs
        working-directory: spartan-hub
        run: |
          test -d dist
          test -d backend/dist

  # E2E (opcional, requiere entorno adecuado)
  e2e-test:
    runs-on: ubuntu-latest
    needs: build-validation
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
      - name: Install deps
        working-directory: spartan-hub
        run: npm ci
      - name: Start services
        working-directory: spartan-hub
        run: |
          npm run build:all
          npm run dev &
          sleep 30
      - name: Run E2E tests
        working-directory: spartan-hub/backend
        run: npm run test:e2e
