name: Code Review and Security Checks

on:
  pull_request:
    branches: [ master, main, develop ]
    types: [ opened, synchronize, reopened ]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run security audit
      run: |
        cd backend && npm audit --audit-level=critical
        cd .. && npm audit --audit-level=critical
        
    - name: TypeScript compilation check
      run: npx tsc --noEmit
      
    - name: Run tests
      run: npm test
      
    - name: Check for generated files
      run: |
        # Fail if coverage reports are staged
        if git diff --cached --name-only | grep -E "(coverage/|lcov-report/)"; then
          echo "❌ Generated coverage reports detected in commit. Please remove them."
          exit 1
        fi
        
        # Warn about other generated files
        GENERATED_FILES=$(git diff --cached --name-only | grep -E "\.(log|tmp|dist|build)")
        if [ -n "$GENERATED_FILES" ]; then
          echo "⚠️ Warning: Generated files detected:"
          echo "$GENERATED_FILES"
        fi

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: ESLint check
      run: npx eslint . --ext .ts,.tsx
      
    - name: Check commit message format
      run: |
        COMMIT_MSG=$(git log --format=%B -n 1 HEAD)
        if [[ ! $COMMIT_MSG =~ ^(feat|fix|chore|docs|style|refactor|perf|test|ci|build|revert)(\(.+\))?: ]]; then
          echo "❌ Commit message does not follow conventional commit format"
          echo "Expected format: type(scope): description"
          echo "Got: $COMMIT_MSG"
          exit 1
        fi

  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate PR template completion
      run: |
        # Check if essential checklist items are marked as complete
        PR_BODY=$(cat << 'EOF'
        ${{ github.event.pull_request.body }}
        EOF
        )
        
        REQUIRED_CHECKS=(
          "- \[x\] Input validation and sanitization implemented"
          "- \[x\] Authentication/authorization properly enforced"
          "- \[x\] Dependencies verified \(0 critical vulnerabilities\)"
          "- \[x\] Type safety maintained \(no 'any' types in critical paths\)"
          "- \[x\] At least 1 team member approval received"
          "- \[x\] Security checklist fully verified by reviewer"
        )
        
        for check in "${REQUIRED_CHECKS[@]}"; do
          if ! echo "$PR_BODY" | grep -q "$check"; then
            echo "❌ Required checklist item not completed: $check"
            exit 1
          fi
        done
        
        echo "✅ All required checklist items completed"

  assign-reviewers:
    name: Assign Reviewers
    runs-on: ubuntu-latest
    needs: pr-validation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Analyze changed files and assign reviewers
      run: |
        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }})
        
        # Determine required reviewers based on CODEOWNERS
        REVIEWERS="@121378-cell"  # Default reviewer
        
        echo "Changed files:"
        echo "$CHANGED_FILES"
        
        # Add comment to PR requesting review
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d '{
            "body": "👋 Hello! This PR has been automatically validated.\n\n**Required Actions:**\n- [ ] Please review the [Security Checklist](../blob/master/PULL_REQUEST_SECURITY_CHECKLIST.md)\n- [ ] Verify all security requirements are met\n- [ ] Approve if all checks pass\n\n**Auto-assigned Reviewer(s):** '"$REVIEWERS"'"
          }'

  merge-protection:
    name: Merge Protection
    if: github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    needs: [pr-validation, assign-reviewers]
    
    steps:
    - name: Block merge if requirements not met
      run: |
        # This job ensures PR cannot be merged until all requirements are met
        echo "🔒 Merge protection active - PR cannot be merged until all requirements are satisfied"
        
        # Check if PR has required approvals
        APPROVALS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews | \
          jq -r '[.[] | select(.state == "APPROVED")] | length')
          
        if [ "$APPROVALS" -lt 1 ]; then
          echo "❌ PR does not have required approvals (minimum 1 needed)"
          exit 1
        fi
        
        echo "✅ PR meets merge requirements"