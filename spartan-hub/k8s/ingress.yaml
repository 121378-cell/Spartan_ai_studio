apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spartan-hub-ingress
  namespace: spartan-hub
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.spartan-hub.com
    - app.spartan-hub.com
    secretName: spartan-hub-tls
  rules:
  - host: api.spartan-hub.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 80
  - host: app.spartan-hub.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
