# Default values for spartan-hub.
nameOverride: ""
fullnameOverride: ""

externalSecretName: ""

replicaCount: 3

image:
  repository: synergycoach/backend
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: false

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: "spartan-hub.local"
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - spartan-hub
        topologyKey: kubernetes.io/hostname

# PostgreSQL Configuration
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  
  replicaCount: 2
  
  service:
    port: 5432
  
  storage:
    storageClass: fast-ssd
    size: 100Gi
  
  primary:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
    
    livenessProbe:
      exec:
        command:
        - pg_isready
        - -U
        - spartan_user
        - -d
        - spartan_fitness
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    
    readinessProbe:
      exec:
        command:
        - pg_isready
        - -U
        - spartan_user
        - -d
        - spartan_fitness
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
    
    securityContext:
      runAsNonRoot: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
    
    env:
      POSTGRES_DB: "spartan_fitness"
      POSTGRES_USER: "spartan_user"
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      POSTGRES_REPLICATION_USER: "replicator"
  
  replicas:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  
  initContainers: []
  extraVolumeMounts: []
  extraVolumes: []

# Ollama Configuration
ollama:
  enabled: true
  replicaCount: 1
  
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 11434
  
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  
  storage:
    size: 50Gi
    storageClass: standard
  
  persistence:
    enabled: true

# AI Microservice Configuration
aiMicroservice:
  enabled: true
  replicaCount: 2
  
  image:
    repository: synergycoach/ai-microservice
    tag: latest
    pullPolicy: Always
  
  service:
    type: ClusterIP
    port: 8000
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  
  model: "gemma2:2b"

# Backend Configuration
backend:
  image:
    repository: synergycoach/backend
    tag: latest
    pullPolicy: Always
  
  replicaCount: 3
  
  service:
    type: ClusterIP
    port: 3001
  
  configMap:
    NODE_ENV: "production"
    POSTGRES_PORT: "5432"
    POSTGRES_POOL_MAX: "20"
    POSTGRES_POOL_IDLE_TIMEOUT: "30000"
    POSTGRES_POOL_CONNECTION_TIMEOUT: "2000"
    REPLICA_HOSTS: "postgres-replica-1,postgres-replica-2"
    REPLICA_PORTS: "5432,5432"
    AI_MICROSERVICE_URL: "http://ai-microservice:8000"
  
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard

# External API Keys (to be overridden)
externalApiKeys:
  apiNinjasKey: ""
  edamamAppId: ""
  edamamAppKey: ""
  fatsecretKey: ""
  rapidapiKey: ""
  exerciseDbKey: ""

# Ingress Configuration
ingress:
  enabled: false
  annotations: {}
  ingressClassName: "nginx"
  host: ""
  tls: []

# Monitoring Configuration
monitoring:
  prometheus:
    enabled: false
  grafana:
    enabled: false

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: "spartan-hub-service-account"

# Security
security:
  podSecurityContext:
    fsGroup: 1000
  
  securityContext:
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false

# Tests
tests:
  enabled: true
