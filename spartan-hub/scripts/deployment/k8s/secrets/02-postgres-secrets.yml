apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: spartan-hub
type: Opaque
stringData:
  postgres-password: "${POSTGRES_PASSWORD}"
  postgres-replication-password: "${POSTGRES_REPLICATION_PASSWORD}"
data:
  # Base64 encoded values will be automatically created from stringData
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: spartan-hub
type: Opaque
stringData:
  jwt-secret: "${JWT_SECRET}"
  session-secret: "${SESSION_SECRET}"
  api-key: "${API_KEY}"
  ollama-api-key: "${OLLAMA_API_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: external-api-keys
  namespace: spartan-hub
type: Opaque
stringData:
  api-ninjas-key: "${API_NINJAS_KEY}"
  edamam-app-id: "${EDAMAM_APP_ID}"
  edamam-app-key: "${EDAMAM_APP_KEY}"
  fatsecret-key: "${FATSECRET_KEY}"
  rapidapi-key: "${RAPIDAPI_KEY}"
  exercise-db-key: "${EXERCISE_DB_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: ollama-secrets
  namespace: spartan-hub
type: Opaque
stringData:
  ollama-model: "gemma2:2b"
  ollama-host: "http://ollama:11434"
