apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: spartan-hub
  labels:
    app: ollama
    component: ai-service
spec:
  type: ClusterIP
  ports:
  - port: 11434
    targetPort: 11434
    protocol: TCP
    name: ollama-api
  selector:
    app: ollama
    component: ai-service
---
apiVersion: v1
kind: Service
metadata:
  name: ai-microservice
  namespace: spartan-hub
  labels:
    app: ai-microservice
    component: ai-service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: ai-api
  selector:
    app: ai-microservice
    component: ai-service
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: spartan-hub
  labels:
    app: backend
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: backend-api
  selector:
    app: backend
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: backend-headless
  namespace: spartan-hub
  labels:
    app: backend
    component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: backend-api
  selector:
    app: backend
    component: api
