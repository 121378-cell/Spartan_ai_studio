---
apiVersion: v1
kind: Service
metadata:
  name: postgres-read-replicas
  namespace: spartan-hub
  labels:
    app: postgres-read-replicas
    component: database-read
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: postgres
    protocol: TCP
    name: postgres
  selector:
    component: database
  sessionAffinity: None
