apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-microservice
  namespace: spartan-hub
  labels:
    app: ai-microservice
    component: ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-microservice
      component: ai-service
  template:
    metadata:
      labels:
        app: ai-microservice
        component: ai-service
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
      containers:
      - name: ai-microservice
        image: synergycoach/ai-microservice:latest
        ports:
        - containerPort: 8000
          name: ai-api
          protocol: TCP
        env:
        - name: OLLAMA_HOST
          value: "http://ollama:11434"
        - name: OLLAMA_MODEL
          valueFrom:
            secretKeyRef:
              name: ollama-secrets
              key: ollama-model
        - name: LOG_LEVEL
          value: "info"
        - name: PORT
          value: "8000"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
      volumes:
      - name: tmp
        emptyDir: {}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0