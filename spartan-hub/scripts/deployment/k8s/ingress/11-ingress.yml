apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spartan-hub-ingress
  namespace: spartan-hub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/cors-allow-origin: "${ALLOWED_ORIGINS}"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # CDN and performance optimizations
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # CDN-specific headers for static assets
      location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        # Set cache headers for CDN
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        # Add CDN-specific headers
        add_header X-Cache-Enable "true";
        add_header X-CDN-Cache "enabled";
      }
    # Rate limiting for CDN protection
    nginx.ingress.kubernetes.io/rate-limit-connections: "100"
    nginx.ingress.kubernetes.io/rate-limit-requests-per-second: "10"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - spartan-hub.com
    secretName: spartan-hub-tls
  - hosts:
    - www.spartan-hub.com
    secretName: spartan-hub-tls
  rules:
  - host: spartan-hub.com
    http:
      paths:
      # CDN-optimized paths for static assets
      - path: /assets
        pathType: Prefix
        backend:
          service:
            name: cdn-proxy
            port:
              number: 80
      - path: /images
        pathType: Prefix
        backend:
          service:
            name: cdn-proxy
            port:
              number: 80
      - path: /fonts
        pathType: Prefix
        backend:
          service:
            name: cdn-proxy
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3001
      - path: /ai
        pathType: Prefix
        backend:
          service:
            name: ai-microservice
            port:
              number: 8000
  - host: www.spartan-hub.com
    http:
      paths:
      # CDN-optimized paths for static assets
      - path: /assets
        pathType: Prefix
        backend:
          service:
            name: cdn-proxy
            port:
              number: 80
      - path: /images
        pathType: Prefix
        backend:
          service:
            name: cdn-proxy
            port:
              number: 80
      - path: /fonts
        pathType: Prefix
        backend:
          service:
            name: cdn-proxy
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3001
      - path: /ai
        pathType: Prefix
        backend:
          service:
            name: ai-microservice
            port:
              number: 8000
---
apiVersion: v1
kind: Secret
metadata:
  name: spartan-hub-tls
  namespace: spartan-hub
type: kubernetes.io/tls
data:
  tls.crt: "
  tls.key: 