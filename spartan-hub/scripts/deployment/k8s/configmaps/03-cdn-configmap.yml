apiVersion: v1
kind: ConfigMap
metadata:
  name: cdn-config
  namespace: spartan-hub
  labels:
    app: cdn
    component: static-assets
data:
  # CDN configuration
  CDN_ENABLED: "true"
  CDN_PROVIDER: "cloudfront"  # Options: cloudfront, cloudflare, akamai
  CDN_DOMAIN: "assets.spartan-hub.com"
  CDN_ORIGIN: "spartan-hub-frontend.spartan-hub.svc.cluster.local"
  
  # Asset paths to cache
  CDN_ASSET_PATHS: "/assets/*,/images/*,/fonts/*,/public/*"
  
  # Cache TTL settings (in seconds)
  CDN_CACHE_TTL_STATIC: "31536000"  # 1 year for static assets (immutable)
  CDN_CACHE_TTL_IMAGES: "2592000"   # 30 days for images
  CDN_CACHE_TTL_FONTS: "2592000"    # 30 days for fonts
  CDN_CACHE_TTL_JS_CSS: "604800"    # 7 days for JS/CSS (versioned)
  
  # Compression settings
  CDN_COMPRESSION_ENABLED: "true"
  CDN_COMPRESSION_FORMATS: "text/html,text/css,application/javascript,image/svg+xml"
  
  # Security headers
  CDN_SECURITY_HEADERS: |
    X-Content-Type-Options: nosniff
    X-Frame-Options: DENY
    X-XSS-Protection: 1; mode=block
    Strict-Transport-Security: max-age=31536000; includeSubDomains; preload
  
  # Invalidations
  CDN_AUTO_INVALIDATE: "true"
  CDN_MANUAL_INVALIDATE_PATH: "/admin/cdn-invalidate"
  
  # Performance settings
  CDN_HTTP_VERSION: "2.0"
  CDN_ENABLE_IPV6: "true"
  CDN_GEO_RESTRICTIONS: ""  # Comma-separated country codes if needed