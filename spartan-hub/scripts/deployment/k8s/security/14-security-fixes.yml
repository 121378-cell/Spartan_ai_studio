apiVersion: v1
kind: ServiceAccount
metadata:
  name: spartan-hub-security-scan
  namespace: spartan-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: security-scan-role
  namespace: spartan-hub
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: security-scan-binding
  namespace: spartan-hub
subjects:
- kind: ServiceAccount
  name: spartan-hub-security-scan
  namespace: spartan-hub
roleRef:
  kind: Role
  name: security-scan-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database-communication
  namespace: spartan-hub
spec:
  podSelector:
    matchLabels:
      component: database
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          component: api
    ports:
    - protocol: TCP
      port: 5432
  egress:
  - to: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: spartan-hub
spec:
  podSelector:
    matchLabels:
      component: api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          component: database
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          component: ai-service
    ports:
    - protocol: TCP
      port: 8000
  - to:
    - podSelector:
        matchLabels:
          component: ai-service
    ports:
    - protocol: TCP
      port: 11434
  - to: []
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: spartan-hub
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-primary-pdb
  namespace: spartan-hub
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres-primary
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: spartan-hub-quota
  namespace: spartan-hub
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: spartan-hub-limits
  namespace: spartan-hub
spec:
  limits:
  - default:
      cpu: 500m
      memory: 1Gi
    defaultRequest:
      cpu: 250m
      memory: 512Mi
    type: Container