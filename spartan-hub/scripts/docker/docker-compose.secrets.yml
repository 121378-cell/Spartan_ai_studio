# Docker Compose Secrets Configuration for Spartan Hub
# This file demonstrates how to use secrets with Docker Compose

version: '3.8'

services:
  spartan-backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_TYPE=postgres
    secrets:
      - api_key
      - db_password
      - ollama_api_key
    env_file:
      - .env.production
    networks:
      - spartan-network

  spartan-ai:
    build: ./AI
    ports:
      - "9000:9000"
    environment:
      - AI_SERVICE_MODE=production
    networks:
      - spartan-network

  postgres-primary:
    image: postgres:15
    environment:
      - POSTGRES_DB=spartan_hub
      - POSTGRES_USER=spartan_user
    secrets:
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spartan-network
    ports:
      - "5432:5432"

  postgres-replica-1:
    image: postgres:15
    environment:
      - POSTGRES_DB=spartan_hub
      - POSTGRES_USER=spartan_user
    secrets:
      - db_password
    networks:
      - spartan-network
    ports:
      - "5433:5432"

  postgres-replica-2:
    image: postgres:15
    environment:
      - POSTGRES_DB=spartan_hub
      - POSTGRES_USER=spartan_user
    secrets:
      - db_password
    networks:
      - spartan-network
    ports:
      - "5434:5432"

secrets:
  api_key:
    file: ./backend/secrets/api_key.txt
  db_password:
    file: ./backend/secrets/db_password.txt
  ollama_api_key:
    file: ./backend/secrets/ollama_api_key.txt

networks:
  spartan-network:
    driver: bridge

volumes:
  postgres_data: